    <h1>Contact Me</h1>
    
    <!-- Registration Form with Table -->
    <form method="post">

        <fieldset>
            <legend>Contact me Form</legend>

            <table>

                <tr>
                    <td><label for="firstname">First Name:</label></td>
                    <td><input type="text" id="firstname" name="First name" required></td>
                </tr>

                <tr>
                    <td><label for="lastname">Last Name:</label></td>
                    <td><input type="text" id="lasttname" name="Last name" required></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="male"> Male
                        <input type="radio" name="gender" value="female"> Female
                    </td>
                </tr>

                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

                 <tr>
                    <td><label for="company">Company Name:</label></td>
                    <td><input type="ecompany" id="company" name="company" required></td>
                </tr>

                

                <tr>
                    <td><label>Reason of Contact:</label></td>
                    <td>
                        <input type="checkbox" value="projects"> Projects
                        <input type="checkbox" value="thesis"> Thesis
                        <input type="checkbox" value="job"> Job
                    
                    </td>
                </tr>

                <tr>
                    <td><label for="topics">Topics:</label></td>
                    <td>
                        <select id="topics" name="topics">
                            <option>Web Development</option>
                            <option>Mobile Development</option>
                            <option>AI/ML Development</option>
                           
                        </select>
                    </td>
                </tr>

                 <tr>
                    <td> <label for="consultationDate">Consultation Date:</label></td>
                    <td>
                        <input type="date" id="consultationDate" name="consultationDate" required>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                        <input type="reset">
                    </td>
                </tr>

            </table>

        </fieldset>

    </form>

   

    
</body>

</html>
