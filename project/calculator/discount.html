<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Discount Calculator Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <h2>Discount Calculator</h2>
        <p class="tax-note">Fixed Tax Rate: 5%</p>

        <div class="input-group">
            <label for="originalPrice">Original Price ($)</label>
            <input type="number" id="originalPrice" placeholder="0.00" min="0">
        </div>

        <div class="input-group">
            <label for="discountPercent">Discount Percentage (%)</label>
            <input type="number" id="discountPercent" placeholder="0" min="0" max="100">
        </div>

        <hr>

        <div class="result-group">
            <label for="finalPrice">Final Price (Incl. Tax)</label>
            <input type="number" id="finalPrice" readonly placeholder="0.00">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
